name: Machine Learning MLOps CI

# Trigger this pipeline every time someone pushes to main or opens a Pull Request
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Clone your repository code onto the cloud server
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up a clean Python environment on the cloud server
    - name: Set up Python
      uses: actions/workflows/setup-python@v5
      with:
        python-version: '3.11'

    # Step 3: Upgrade pip and install your required dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4: Execute pytest automatically in the cloud
    - name: Run Automated Unit Tests
      run: |
        pytest